# OLAP-tuned for ~7.5 GB Docker container / 4 cores

# Network — must listen on all interfaces so other containers can connect
listen_addresses = '*'

# Memory
shared_buffers = 1536MB
work_mem = 64MB
maintenance_work_mem = 512MB
effective_cache_size = 4GB

# Parallelism (4 cores)
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# Storage (SSD)
random_page_cost = 1.1
effective_io_concurrency = 200

# WAL / checkpoints
checkpoint_completion_target = 0.9
wal_buffers = 64MB
min_wal_size = 1GB
max_wal_size = 4GB

# Connections — PgBouncer is in front, keep this low
max_connections = 50

# Logging
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_lock_waits = on

# Extensions to preload
shared_preload_libraries = 'pg_stat_statements,pg_partman_bgw,pg_cron'
pg_stat_statements.track = all
pg_partman_bgw.dbname = 'warehouse'
pg_partman_bgw.role = 'satyaki'
cron.database_name = 'warehouse'

# ── WAL Archiving / Point-in-Time Recovery (PITR) ─────────────────────────────
# WAL segments are archived to the host via a bind-mount in docker-compose.yml.
# On a read-mostly OLAP warehouse, WAL volume is very low (~50 MB/day).
# archive_timeout=3600 bounds RPO to 1 hour even with zero write activity.
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 3600
wal_keep_size = 2GB
